name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Only one release job runs at a time; cancel in-progress runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Create an Android debug keystore used for release signing in CI.
      # For production releases, override with KEYSTORE_PATH / KEYSTORE_PASS /
      # KEY_ALIAS / KEY_PASS repository secrets.
      - name: Create debug keystore (CI signing)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # The downloadWasmedge Gradle task fetches the prebuilt arm64 .so.
      # We cache it so repeated CI runs skip the ~30 MB download.
      - name: Cache WasmEdge prebuilt
        uses: actions/cache@v4
        with:
          path: app/build/wasmedge
          key: wasmedge-android-arm64-0.14.1

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Install WABT
        run: |
          for i in {1..3}; do
            sudo apt-get update && sudo apt-get install -y wabt && break || sleep 15
          done

      - name: Build example WASM packages
        run: |
          set -euo pipefail
          mkdir -p release-assets/examples

          wat2wasm pwa/demo/examples/fixed_ok.wat -o release-assets/examples/fixed_ok.wasm
          wat2wasm pwa/demo/examples/fixed_error.wat -o release-assets/examples/fixed_error.wasm
          wat2wasm pwa/demo/examples/echo_wrapped.wat -o release-assets/examples/echo_wrapped.wasm
          wat2wasm pwa/demo/examples/advanced/fnv_report.wat -o release-assets/examples/fnv_report.wasm
          wat2wasm pwa/demo/examples/advanced/math_double.wat -o release-assets/examples/math_double.wasm
          wat2wasm pwa/demo/examples/advanced/math_sum.wat -o release-assets/examples/math_sum.wasm
          wat2wasm pwa/demo/examples/advanced/math_subtract.wat -o release-assets/examples/math_subtract.wasm
          wat2wasm pwa/demo/examples/advanced/math_multiply.wat -o release-assets/examples/math_multiply.wasm
          wat2wasm pwa/demo/examples/advanced/math_divide.wat -o release-assets/examples/math_divide.wasm
          wat2wasm app/src/main/assets/chess.wat -o app/src/main/assets/chess.wasm

          cat > release-assets/examples/manifest_fixed_ok.json <<'JSON'
          {
            "version": 1,
            "name": "fixed-ok-package",
            "modules": [
              { "name": "fixed_ok", "file": "fixed_ok.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_fixed_error.json <<'JSON'
          {
            "version": 1,
            "name": "fixed-error-package",
            "modules": [
              { "name": "fixed_error", "file": "fixed_error.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_echo_wrapped.json <<'JSON'
          {
            "version": 1,
            "name": "echo-wrapped-package",
            "modules": [
              { "name": "echo_wrapped", "file": "echo_wrapped.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_fnv_report.json <<'JSON'
          {
            "version": 1,
            "name": "fnv-report-package",
            "modules": [
              { "name": "fnv_report", "file": "fnv_report.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_math_double.json <<'JSON'
          {
            "version": 1,
            "name": "math-double-package",
            "modules": [
              { "name": "math_double", "file": "math_double.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_math_sum.json <<'JSON'
          {
            "version": 1,
            "name": "math-sum-package",
            "modules": [
              { "name": "math_sum", "file": "math_sum.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_math_subtract.json <<'JSON'
          {
            "version": 1,
            "name": "math-subtract-package",
            "modules": [
              { "name": "math_subtract", "file": "math_subtract.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_math_multiply.json <<'JSON'
          {
            "version": 1,
            "name": "math-multiply-package",
            "modules": [
              { "name": "math_multiply", "file": "math_multiply.wasm" }
            ]
          }
          JSON

          cat > release-assets/examples/manifest_math_divide.json <<'JSON'
          {
            "version": 1,
            "name": "math-divide-package",
            "modules": [
              { "name": "math_divide", "file": "math_divide.wasm" }
            ]
          }
          JSON

          cp release-assets/examples/manifest_fixed_ok.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X fixed_ok.zip manifest.json fixed_ok.wasm)

          cp release-assets/examples/manifest_fixed_error.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X fixed_error.zip manifest.json fixed_error.wasm)

          cp release-assets/examples/manifest_echo_wrapped.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X echo_wrapped.zip manifest.json echo_wrapped.wasm)

          cp release-assets/examples/manifest_fnv_report.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X fnv_report.zip manifest.json fnv_report.wasm)

          cp release-assets/examples/manifest_math_double.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X math_double.zip manifest.json math_double.wasm)

          cp release-assets/examples/manifest_math_sum.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X math_sum.zip manifest.json math_sum.wasm)

          cp release-assets/examples/manifest_math_subtract.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X math_subtract.zip manifest.json math_subtract.wasm)

          cp release-assets/examples/manifest_math_multiply.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X math_multiply.zip manifest.json math_multiply.wasm)

          cp release-assets/examples/manifest_math_divide.json release-assets/examples/manifest.json
          (cd release-assets/examples && zip -q -X math_divide.zip manifest.json math_divide.wasm)

          rm -f release-assets/examples/manifest.json
          sha256sum release-assets/examples/*.zip > release-assets/examples/SHA256SUMS.txt

      - name: Locate APK
        id: apk_path
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk_path.outputs.path }}
          retention-days: 30

      - name: Upload example package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: example-packages
          path: release-assets/examples/*
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  tag:
    name: Create & push version tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName\s*=' app/build.gradle.kts | head -1 \
            | sed 's/.*versionName\s*=\s*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract versionName from app/build.gradle.kts"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: v${VERSION}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.version }}"
          # Tags are immutable release identifiers. If the remote already has
          # this tag, do not fail the job.
          REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}')
          if [ -n "$REMOTE_SHA" ]; then
            echo "Tag $TAG already exists on origin at $REMOTE_SHA - skipping tag creation."
          else
            git fetch --tags --force
            git tag "$TAG"
            git push origin "$TAG"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Download example package artifacts
        uses: actions/download-artifact@v4
        with:
          name: example-packages
          path: examples

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version_tag }}
          name: MobileWasm ${{ needs.tag.outputs.version_tag }}
          files: |
            *.apk
            examples/*.zip
            examples/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## MobileWasm ${{ needs.tag.outputs.version_tag }}

            ### Installation
            Download the `.apk` below and sideload it:
            ```
              adb install app-release.apk
            ```

            ### What's included
            - WasmEdge 0.14.1 runtime (arm64-v8a)
            - ZIP package installer with SHA-256 verification and ZIP-slip protection
            - `manifest.json` parser / validator supporting multiple independent modules
            - Global singleton `WasmEngine` with mutex-guarded load / run / hot-swap
            - Demo package bundled in assets (`sample/demo.zip`)
            - Example WASM packages attached as release assets (`fixed_ok.zip`, `fixed_error.zip`, `echo_wrapped.zip`, `fnv_report.zip`, `math_double.zip`, `math_sum.zip`, `math_subtract.zip`, `math_multiply.zip`, `math_divide.zip`)
