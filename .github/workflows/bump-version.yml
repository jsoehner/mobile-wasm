name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bump script
        run: ./scripts/bump_version.sh ${{ github.event.inputs.bump_type }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to $(grep 'versionName' app/build.gradle.kts | sed 's/.*\"\(.*\)\".*/\1/')"
          git push
